name: Java CI on Windows

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

jobs:
    style_and_checks:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Java 21
              uses: actions/setup-java@v5
              with:
                java-version: '21'
                distribution: 'temurin'

            - name: Run Checkstyle
              run: mvn clean checkstyle:checkstyle

            - name: Run PMD
              run: mvn clean pmd:check

            - name: Run SpotBugs
              run: mvn clean spotbugs:check
        
    build_and_test:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6
            
            - name: Set up Java 21
              uses: actions/setup-java@v5
              with:
                java-version: '21'
                distribution: 'temurin'

            - name: Build and test
              run: mvn clean verify

